<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Site.Title }}</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f7f4ef;
      color: #1f1a17;
    }

    main {
      padding: 2rem;
      text-align: center;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2.5rem, 8vw, 4rem);
      line-height: 1;
    }

    p {
      margin: 0;
      font-size: 1.125rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Something fishy is coming...</h1>
  </main>
</body>
</html>
